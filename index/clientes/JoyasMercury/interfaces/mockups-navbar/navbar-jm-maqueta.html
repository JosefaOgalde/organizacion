<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar · maqueta desktop · Joyas Mercury</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="navbar-jm-maqueta.css">
</head>
<body>
  <div class="maqueta-page">
    <header class="maqueta-page__head">
      <h1>Navbar · Joyas Mercury</h1>
      <p>Maqueta desktop · identidad manual (#ECC54A · #C88F9C · #D8BFB1)</p>
    </header>

    <section class="maqueta-block maqueta-block--desktop" aria-label="Navbar desktop">
      <p class="maqueta-block__label">Desktop · 1280px</p>
      <div class="maqueta-frame maqueta-frame--desktop">
        <div class="jm-navbar-wrap">
          <div class="jm-navbar-accent" aria-hidden="true"></div>

          <div class="jm-topbar jm-topbar--brand">
            <a class="jm-navbar__brand" href="#" aria-label="Joyas Mercury — inicio">
              <img src="../../identidad/isotipo-jm-gold.png" alt="Joyas Mercury"
                onerror="this.dataset.error='1'">
              <div class="jm-navbar__brand-fallback" aria-hidden="true">
                <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M20 4l3 8h8l-6.5 5 2.5 8.5L20 20l-7 5.5 2.5-8.5L9 12h8L20 4z" fill="#ECC54A" stroke="#A97E23" stroke-width="1"/>
                </svg>
              </div>
            </a>
          </div>

          <nav class="jm-navbar jm-navbar--sub" aria-label="Navegación principal">
            <ul class="jm-navbar__links jm-navbar__links--right">
              <li><a href="#" class="is-active">Inicio</a></li>
              <li><a href="#">Colecciones</a></li>
            </ul>
          </nav>
        </div>
        <div class="jm-preview-hero" aria-hidden="true">
          <p>Joyas que te hacen brillar</p>
        </div>
      </div>
    </section>
  </div>

  <script>
    (function () {
      const p = new URLSearchParams(location.search);
      if (p.get('shot') === '1' || p.get('shot') === 'desktop') {
        document.body.dataset.shot = 'desktop';
      }
    })();
  </script>
</body>
</html>
