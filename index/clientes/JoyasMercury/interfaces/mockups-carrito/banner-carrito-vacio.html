<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner carrito vacío · 1000×500 · Joyas Mercury</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #fdfbf8;
      --mauve: #3d3d3d;
      --rose: #e197ac;
      --gold: #c59446;
      --gold-light: #ecc54a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', system-ui, sans-serif;
      background: #e8e4e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }
    body[data-shot="1"] { background: var(--cream); padding: 0; }
    body[data-shot="1"] .preview-note,
    body[data-shot="1"] .preview-wrap h1 { display: none; }
    body[data-shot="1"] .jm-cart-banner {
      width: 1000px !important;
      height: 500px !important;
      max-width: none !important;
      aspect-ratio: auto !important;
    }

    .preview-note {
      font-size: 0.75rem; color: #888; text-align: center; max-width: 520px; line-height: 1.5;
    }
    .preview-wrap h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.1rem; color: var(--mauve); margin-bottom: 0.75rem; text-align: center;
    }

    /* —— Banner 1000 × 500 —— */
    .jm-cart-banner {
      width: 1000px;
      height: 500px;
      max-width: 100%;
      aspect-ratio: 2 / 1;
      position: relative;
      overflow: hidden;
      background: var(--cream);
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .jm-cart-banner__copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem 2.5rem 3rem 3.5rem;
      z-index: 2;
      position: relative;
    }

    .jm-cart-banner__icon {
      width: 48px;
      height: 48px;
      margin-bottom: 1.25rem;
      color: var(--gold);
    }
    .jm-cart-banner__icon svg {
      width: 100%; height: 100%;
      stroke: currentColor; fill: none; stroke-width: 1.2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .jm-cart-banner__title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.15rem;
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: 0.02em;
      color: var(--mauve);
      margin-bottom: 0.85rem;
    }
    .jm-cart-banner__title em {
      font-style: normal;
      color: var(--rose);
    }

    .jm-cart-banner__rule {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 1rem;
      max-width: 220px;
    }
    .jm-cart-banner__rule::before,
    .jm-cart-banner__rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gold);
      opacity: 0.75;
    }
    .jm-cart-banner__rule span {
      color: var(--gold);
      font-size: 0.55rem;
      transform: rotate(45deg);
      display: inline-block;
    }

    .jm-cart-banner__text {
      font-size: 0.78rem;
      line-height: 1.55;
      color: #6a6a6a;
      max-width: 22rem;
      margin-bottom: 1.5rem;
    }

    .jm-cart-banner__cta {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.75rem 1.65rem;
      background: var(--gold);
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      width: fit-content;
      box-shadow: 0 2px 8px rgba(197,148,70,0.25);
    }
    .jm-cart-banner__cta:hover { background: #b0843e; }

    .jm-cart-banner__visual {
      position: relative;
      overflow: hidden;
    }
    .jm-cart-banner__visual::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(90deg, var(--cream) 0%, rgba(253,251,248,0.92) 12%, rgba(253,251,248,0.4) 35%, transparent 55%);
    }
    .jm-cart-banner__photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
    }
    .jm-cart-banner__photo-fallback {
      width: 100%;
      height: 100%;
      background:
        linear-gradient(145deg, rgba(225,151,172,0.08) 0%, transparent 50%),
        url('../../flujo-actual/01-inicio-home.png') center / cover no-repeat;
    }

    @media (max-width: 1020px) {
      .jm-cart-banner {
        width: 100%;
        height: auto;
        min-height: 280px;
        grid-template-columns: 1fr;
        grid-template-rows: auto 200px;
      }
      .jm-cart-banner__copy { padding: 2rem 1.5rem; }
      .jm-cart-banner__title { font-size: 1.65rem; }
      .jm-cart-banner__visual { min-height: 200px; }
      .jm-cart-banner__visual::before {
        background: linear-gradient(180deg, var(--cream) 0%, transparent 30%);
      }
    }
  </style>
</head>
<body>
  <div class="preview-wrap">
    <h1>Banner carrito vacío · 1000 × 500 px</h1>
    <p class="preview-note">Referencia diseño JM · exportar PNG con <code>python3 scripts/capturar-jm-banner-carrito.py</code></p>

    <article class="jm-cart-banner" id="banner-carrito" aria-label="Tu carrito está vacío">
      <div class="jm-cart-banner__copy">
        <div class="jm-cart-banner__icon" aria-hidden="true">
          <svg viewBox="0 0 48 48">
            <path d="M14 18h20l-2 16H16L14 18z"/>
            <path d="M18 18V14a6 6 0 0112 0v4"/>
            <path d="M24 26c-2 0-3.5 1.5-3.5 3.5S22 33 24 33s3.5-1.5 3.5-3.5S26 26 24 26z" fill="currentColor" stroke="none" opacity="0.85"/>
            <path d="M20 8l1 2M28 8l-1 2M24 5v2" stroke-width="1"/>
          </svg>
        </div>
        <h2 class="jm-cart-banner__title">Tu carrito está <em>vacío</em></h2>
        <div class="jm-cart-banner__rule" aria-hidden="true"><span>◆</span></div>
        <p class="jm-cart-banner__text">
          Parece que aún no agregaste ninguna joya. ¡Descubre nuestras colecciones y encuentra tu próxima joya favorita! ♡
        </p>
        <a class="jm-cart-banner__cta" href="../mockups-coleccion/wireframe-coleccion.html?coleccion=esencial">✦ Ver colecciones</a>
      </div>
      <div class="jm-cart-banner__visual">
        <div class="jm-cart-banner__photo-fallback" role="img" aria-label="Joyas sobre fondo suave"></div>
      </div>
    </article>
  </div>

  <script>
    if (new URLSearchParams(location.search).get('shot') === '1') {
      document.body.dataset.shot = '1';
    }
  </script>
</body>
</html>
