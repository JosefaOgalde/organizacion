<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframes · Joyas Mercury</title>
  <link rel="stylesheet" href="../../../styles.css">
  <link rel="stylesheet" href="../../assets/jm-landing.css?v=wireframe2">
  <link rel="stylesheet" href="wireframes-page.css?v=wireframe2">
  <style>
    body { margin: 0; background: #3d3d3d; padding: 1rem; min-height: 100vh; }
    .wrap { max-width: 720px; margin: 0 auto; }
    .jm-wf-page-top {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 1rem;
      margin-bottom: 0.85rem;
      color: #fff;
    }
    .jm-wf-page-top h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      flex: 1 1 auto;
    }
    .jm-wf-page-top nav { display: flex; flex-wrap: wrap; gap: 0.45rem; align-items: center; }
    .jm-wf-page-top nav a {
      padding: 0.42rem 0.8rem;
      background: #fff;
      color: #9a5a6e;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .jm-wf-page-top nav a.ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.35); }
    #hub-root {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem 1.35rem 1.5rem;
    }
    .jm-wf-hub-intro { margin: 0 0 1rem; color: #666; font-size: 0.92rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="jm-wf-page-top">
      <h1>Joyas Mercury · Wireframes</h1>
      <nav>
        <a href="./" class="ghost">← Landing</a>
        <a href="../../../index.html" class="ghost">Organizador</a>
      </nav>
    </header>
    <div id="hub-root">
      <p class="jm-wf-hub-intro">Elige la vista para revisar las 7 pantallas de referencia.</p>
      <div id="hub-cards"></div>
    </div>
  </div>
  <script src="interfaces/referencia-landings/carrusel.manifest.js?v=7"></script>
  <script src="../../../data/jm-backup-contenido.js?v=wireframe2"></script>
  <script>
    (function () {
      const root = document.getElementById('hub-cards');
      if (!root || typeof window.jmHtmlWireframesHub !== 'function') return;
      const readyDesktop = window.jmLandingsCarruselReady;
      const readyMobile = window.jmLandingsCarruselMobileReady;
      const boot = () => { root.innerHTML = window.jmHtmlWireframesHub(); };
      Promise.all([
        readyDesktop && typeof readyDesktop.then === 'function' ? readyDesktop : Promise.resolve(),
        readyMobile && typeof readyMobile.then === 'function' ? readyMobile : Promise.resolve()
      ]).finally(boot);
    })();
  </script>
</body>
</html>
