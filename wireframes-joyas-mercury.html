<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wireframes · Joyas Mercury</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin: 0; background: #3d3d3d; padding: 1rem; }
    .wrap { max-width: 920px; margin: 0 auto; }
    header {
      background: #fdf0f4;
      border: 2px solid #e8b8c8;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }
    header h1 { margin: 0 0 0.35rem; color: #9a5a6e; font-size: 1.45rem; }
    header p { margin: 0; color: #666; }
    header nav { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    header nav a {
      padding: 0.45rem 0.85rem;
      background: #9a5a6e;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
    }
    header nav a.ghost { background: #fff; color: #9a5a6e; border: 1px solid #e8b8c8; }
    #galeria-root {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.25rem 1.25rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Joyas Mercury · wireframes actuales</h1>
      <p>joyasmercury.cl — flechas o clic izquierda/derecha en la imagen para navegar.</p>
      <nav>
        <a href="index.html">← Organizador</a>
        <a href="index.html#clientes" class="ghost">Clientes</a>
      </nav>
    </header>
    <div id="galeria-root"></div>
  </div>
  <script src="data/jm-backup-contenido.js"></script>
  <script>
    (function () {
      const root = document.getElementById('galeria-root');
      if (!root || typeof window.jmHtmlWireframes !== 'function') return;
      root.innerHTML = window.jmHtmlWireframes();
      if (typeof window.initJMGalerias === 'function') window.initJMGalerias(root);
    })();
  </script>
</body>
</html>
