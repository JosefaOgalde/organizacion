<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prototipo interactivo · Joyas Mercury</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin: 0; background: #2a2a2a; padding: 1rem; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    header {
      background: #fdf0f4;
      border: 2px solid #e8b8c8;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    header h1 { margin: 0 0 0.35rem; color: #9a5a6e; font-size: 1.35rem; }
    header p { margin: 0; color: #666; font-size: 0.92rem; }
    header nav { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    header nav a {
      padding: 0.4rem 0.8rem;
      background: #9a5a6e;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    header nav a.ghost { background: #fff; color: #9a5a6e; border: 1px solid #e8b8c8; }
    #prototipo-root {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.15rem 1.25rem;
    }
    .ficha-seccion--prototipo-solo { border: none; padding: 0; margin: 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Joyas Mercury · prototipo interactivo</h1>
      <p>Flujo actual del sitio en producción · 8 pantallas ordenadas.</p>
      <nav>
        <a href="index/clientes/joyasmercury/">← Ficha JM</a>
        <a href="index.html" class="ghost">Organizador</a>
      </nav>
    </header>
    <div id="prototipo-root"></div>
  </div>
  <script src="data/jm-backup-contenido.js"></script>
  <script>
    (function () {
      const root = document.getElementById('prototipo-root');
      if (!root || typeof window.jmHtmlPrototipoPagina !== 'function') return;
      root.innerHTML = window.jmHtmlPrototipoPagina();
      if (typeof window.initJMWireframesUI === 'function') window.initJMWireframesUI(root);
    })();
  </script>
</body>
</html>
